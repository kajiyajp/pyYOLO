# 作成: 2026-06-28
# 目的: YOLO11 Pose(キーポイント)学習用 dataset 設定ファイルのドラフト。
#       L字マークの「頂点」を1キーポイントとして直接検出させる構成。
#       使い方: python scripts/train_pose.py configs/pose_example.yaml l_mark_pose 120
#
# 【重要】ラベル形式(detect/obb とは異なる)
#   1行 = 1物体。pose用の .txt は以下の並び(全て0..1正規化):
#     class  cx cy w h  px1 py1 v1  [px2 py2 v2 ...]
#   - cx cy w h : 物体を囲むbbox(従来のYOLO bboxと同じ)
#   - px py v   : キーポイント1点ぶん。v=可視フラグ
#                 v=0 ラベル無し(損失から除外) / v=1 隠れ / v=2 可視
#   - 1行の列数は固定 5 + K*D。K=1,D=3 なら 8列。
#     同一ファイル内で 5値行と8値行を混在させると Pose ローダが弾くので、
#     頂点未指定の物体も px=0 py=0 v=0 で必ず8列にして混在を避ける。
#   - 本データは「L字頂点=1点」なので 1物体につき px1 py1 v1 の3値が付く。
#     例(1クラス1キーポイント): "0 0.50 0.50 0.08 0.08 0.50 0.50 2"
#     ※この例ではbbox中心とキーポイントを同じ点に置いているが、
#       実運用ではL字頂点を囲む小さなbboxを作り、その頂点をpxpyに入れる。

path: C:/Users/kajiy/Documents/git-personal/pyYOLO/dataset_pose
train: images/train
val: images/val

# --- Pose必須項目 ---
# kpt_shape: [キーポイント数K, 各点の次元D]
#   D=2 なら (x, y) のみ / D=3 なら (x, y, visible)。
#   可視フラグ付きラベル(v列あり)を使うので 3 にする。
kpt_shape: [1, 3]

# flip_idx: 左右反転augmentation時のキーポイント並べ替え表。
#   「反転後にi番目へ来る点は、元の何番だったか」を全点ぶん列挙する。長さは必ず K と一致。
#   ★★★ 重要 ★★★
#   flip_idx=[0] は「並べ替え相手が無い」という意味であって、
#   「左右反転(fliplr)を安全に使える」という意味では『ない』。
#   単一の非対称頂点(L字の角など)は、画像を左右反転すると角の位置が反対側へ来るのに
#   ラベルは同じ頂点クラスのままになり、検出器が『どの角か』を一貫学習できず精度が劣化する。
#   → このような単一非対称頂点では学習側で必ず fliplr=0.0 にすること
#     (scripts/train_pose.py は fliplr=0.0 / flipud=0.0 で設定済み)。
#   左右反転を増強に使いたいなら、下の多点例のように左右対称な点ペアを作り、
#   flip_idx に入れ替えペアを書いた上で fliplr>0 を有効化する。
flip_idx: [0]

# クラス定義。今回はL字頂点の検出に集中するため1クラス。
nc: 1
names:
  0: l_mark


# =====================================================================
# 参考: 多クラス / 多キーポイントに広げる場合の書き方(コメントのみ)
# =====================================================================
# Poseでは kpt_shape は「全クラス共通」で、点数は1物体あたり固定になる。
# クラスごとに点数を変えることはできない(YOLOの仕様)。
# そのため複数の種類のマーク(l_mark / cross / circle_cross ...)を
# 1つのPoseモデルで扱うなら、いずれも「同じ点数」に揃える必要がある。
#
# 例) 各マークを4頂点(コの字/十字の端点など)で表す場合:
#   kpt_shape: [4, 3]
#   # 4点を「左上→右上→右下→左下」の順で定義したとすると、
#   # 左右反転すると 左上<->右上, 左下<->右下 が入れ替わる:
#   #   並べ替え後の各位置に来る元index = [1, 0, 3, 2]
#   flip_idx: [1, 0, 3, 2]
#   # このように左右対称ペアが定義できて初めて fliplr>0 を有効化してよい。
#   nc: 4
#   names:
#     0: l_mark
#     1: cross
#     2: circle_cross
#     3: l_mark_black
#
# 補足:
#   - flip_idx の長さは必ず kpt_shape[0](=点数)と一致させる。
#     不一致だと学習開始時にエラーになる。
#   - 左右非対称で入れ替える相手が無い点は、自分自身のindexを書く(恒等)が、
#     その場合は前述のとおり fliplr=0.0 にして左右反転自体を使わない。
#   - もし種類ごとに頂点数が本質的に違うなら、無理に1モデルへ詰めず
#     クラスごとに別Poseモデルを学習する方が安定する。
